<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>mechendo com cores</title>
    <style>
        body {
            background-color: rgb(104, 31, 31);
            font-family:'Lucida Sans', 'Lucida Sans Regular', 'Lucida Grande', 'Lucida Sans Unicode', Geneva, Verdana, sans-serif;
            
        }
        h1 {
            font-family: 'Trebuchet MS', 'Lucida Sans Unicode', 'Lucida Grande', 'Lucida Sans', Arial, sans-serif;
            font-size: 350%;
            text-align: center;
        }
        div {
            font-size: 100%;
            text-align: center;
            background-color: rgb(145, 23, 23);
            border: none;
            border-radius: 50px;
        }

        button {
            font-size: 100%;
            text-align: center;
            background-color: rgb(41, 11, 11);
            border: none;
            border-radius: 500px;
            padding: 10px 20px; /* Dá um "respiro" no botão */
    cursor: pointer; /* Transforma a seta do mouse na mãozinha */
    transition: 0.5s;

        }
        button:hover {
    background-color: rgb(104, 31, 31); /* Muda para a cor do fundo ao encostar */
    transform: scale(1.3); /* Faz o botão crescer um pouquinho */
    padding: 10px 20px;
}



    </style>
</head>
<body>
    <h1>titulo</h1>
    <div>clique aqui <br>
        
        <a href="">
            
            <button>Link</button>
            
        </a>
        
    </div>


        
    
    
    
    
</body>
</html>
