<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>formularioe 3</title>
    <style>
        .botao {
            background-color: blue;
            width: 100px;
            height: 30px;
            border-radius: 20px;
            box-shadow: 2px 1px 1px rgba(0, 0, 0, 0.456);
        }

        .botao:hover {
            transform: scale(1.1);
        }
    </style>
</head>
<body>
    <h1>teste de formularios</h1>
    <form action="cadastro.php" method="get">
    <p>
        <label for="inome">nome</label>
        <input type="text" name="nome" id="inome" required maxlength="30"
        placeholder="nome completo" autocomplete="name">
    </p>

    <p><label for="imedia">media</label>
    <input type="number" name="media" id="imedia" min="0" max="10"
    placeholder="0 a 10">
    </p>

    <p><label for="imes">calendario</label>
        <input type="month" name="mes" id="imes" value="2026-05">
    </p>

    <p><label for="idia">dia</label>
        <input type="date" name="dia" id="idia" value="2026-05-04">
    </p>

    <p>
        <label for="ihora">hora</label>
        <input type="time" name="hora" id="ihora" value="17:19">
    </p>

    <p><input type="submit" value="enviar" class="botao"></p>
    </form>
</body>
</html>
